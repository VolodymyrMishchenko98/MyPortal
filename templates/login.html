{% extends 'base.html' %}

{% block title %}Вхід - МійПортал{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="form-title">Вхід</h1>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
            <label class="form-label">Логін</label>
            <input type="text" name="username" class="form-input" required id="id_username">
        </div>
        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-input" required id="id_password">
        </div>
        <button type="submit" class="btn btn-block">Увійти</button>
    </form>
    <p class="text-center mt-2">
        Немає акаунту? <a href="{% url 'register' %}">Зареєструватися</a>
    </p>
</div>
{% endblock %}
