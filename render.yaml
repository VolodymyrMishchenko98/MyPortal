services:
  - type: web
    name: myportal
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myportal-db
          property: connectionString
      - key: RENDER
        value: "true"

databases:
  - name: myportal-db
    plan: free